<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#0d0c1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Ripple arcs — semicircles centered at (256, 296) -->
  <!-- Outermost -->
  <path d="M 96,296 A 160,160,0,0,0,416,296"
        fill="none" stroke="#FACC15" stroke-width="14" stroke-linecap="round" opacity="0.22"/>
  <!-- Middle -->
  <path d="M 146,296 A 110,110,0,0,0,366,296"
        fill="none" stroke="#FACC15" stroke-width="17" stroke-linecap="round" opacity="0.50"/>
  <!-- Inner -->
  <path d="M 196,296 A 60,60,0,0,0,316,296"
        fill="none" stroke="#FACC15" stroke-width="20" stroke-linecap="round" opacity="0.80"/>

  <!-- Water drop: tip at (256,152), circle centre at (256,258), radius 42 -->
  <!-- Bottom of circle = 258+42 = 300 ≈ ripple centre -->
  <path d="M 256,152
           C 256,152 298,208 298,258
           A 42,42,0,1,0,214,258
           C 214,208 256,152 256,152 Z"
        fill="#FACC15" filter="url(#glow)"/>
</svg>
